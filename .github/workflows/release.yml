name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Build archive
        run: |
          package="agy-hud"
          mkdir -p "release/${package}/hooks" "release/${package}/dist" "release/${package}/docs"
          cp plugin.json config.example.json README.md README.zh-CN.md LICENSE SECURITY.md CONTRIBUTING.md CHANGELOG.md "release/${package}/"
          cp hooks/status-line.sh "release/${package}/hooks/"
          cp dist/agy-hud.js "release/${package}/dist/"
          cp docs/hud-preview.png "release/${package}/docs/"
          tar -czf "${package}.tar.gz" -C release "${package}"
      - uses: actions/upload-artifact@v7
        with:
          name: agy-hud
          path: agy-hud.tar.gz

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
